<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>한국 배당 ETF</title>
  <style>
    :root {
      --bg: #0f1a1c;
      --card: #152326;
      --text: #e9f0f1;
      --muted: #b6c6c8;
      --accent: #50d7c5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans KR", "Pretendard", "Segoe UI", sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #1b3034, transparent),
                  radial-gradient(900px 600px at 90% 10%, #16353a, transparent),
                  var(--bg);
      color: var(--text);
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 48px 20px; }
    .title { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
    .subtitle { color: var(--muted); margin-top: 8px; }
    .card {
      margin-top: 24px;
      background: var(--card);
      border: 1px solid #1f3438;
      border-radius: 16px;
      padding: 20px;
    }
    .btn {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #2a4a4f;
      color: var(--text);
      text-decoration: none;
      background: #1c2f33;
    }
    .section-title { font-size: 18px; font-weight: 600; margin: 0 0 12px; }
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid #1f3438; }
    table { width: 100%; border-collapse: collapse; min-width: 720px; }
    th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #1f3438; }
    th { color: var(--muted); font-weight: 600; font-size: 13px; letter-spacing: 0.2px; }
    td { font-size: 14px; }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #1a2b2f; }
    tbody tr.active { background: #1d3237; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #20383d;
      border: 1px solid #2a4a4f;
      font-size: 12px;
      color: var(--muted);
    }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">한국 배당 ETF</div>
    <div class="subtitle" style="display:none;"></div>


    <div class="card" id="list-card">
      <div class="section-title">ETF 목록 (시가총액 내림차순)</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>종목</th>
              <th>티커</th>
              <th>가격</th>
              <th>분배금</th>
              <th>추정 배당률</th>
              <th>분배 주기</th>
              <th>시가총액</th>
              <th>기준일</th>
            </tr>
          </thead>
          <tbody id="etf-rows">
            <tr><td colspan="8" class="muted">데이터 로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const fmtNumber = (v) => {
      if (v === null || v === undefined || v === '') return '-';
      const n = Number(v);
      if (Number.isNaN(n)) return String(v);
      return n.toLocaleString('ko-KR');
    };

    const fmtPercent = (v) => {
      if (v === null || v === undefined || v === '') return '-';
      const n = Number(v);
      if (Number.isNaN(n)) return String(v);
      return `${n.toFixed(2)}%`;
    };

    const fmtDate = (v) => {
      if (!v) return '-';
      if (/^\d{8}$/.test(v)) {
        return `${v.slice(0,4)}-${v.slice(4,6)}-${v.slice(6,8)}`;
      }
      return v;
    };

    const freqToTimes = (freq) => {
      if (!freq) return null;
      const f = String(freq).toLowerCase();
      if (f === 'monthly') return 12;
      if (f === 'quarterly') return 4;
      if (f === 'semiannual' || f === 'semi-annual') return 2;
      if (f === 'annual' || f === 'yearly') return 1;
      return null;
    };

    const calcYield = (price, distAmount, freq) => {
      const times = freqToTimes(freq);
      const p = Number(price);
      const d = Number(distAmount);
      if (!times || !p || !d) return null;
      return (d * times / p) * 100;
    };

    fetch('./data/etfs.json')
      .then(r => r.json())
      .then(d => {
        const count = Array.isArray(d.etfs) ? d.etfs.length : 0;
        const asOf = d.as_of || 'unknown';

        const rows = document.getElementById('etf-rows');
        if (!Array.isArray(d.etfs) || d.etfs.length === 0) {
          rows.innerHTML = '<tr><td colspan="8" class="muted">데이터가 없습니다.</td></tr>';
          return;
        }

        const sorted = [...d.etfs].sort((a, b) => {
          const am = (a.price && a.price.market_cap) || 0;
          const bm = (b.price && b.price.market_cap) || 0;
          return bm - am;
        });

        rows.innerHTML = sorted.map((etf, idx) => {
          const price = etf.price || {};
          const dist = etf.distribution || {};
          const cc = etf.covered_call_ratio || {};

          const priceText = price.close != null ? `${fmtNumber(price.close)}원` : '-';
          const distText = dist.latest_amount != null ? `${fmtNumber(dist.latest_amount)}원` : '-';
          const yieldValue = calcYield(price.close, dist.latest_amount, dist.frequency);
          const yieldText = yieldValue != null ? fmtPercent(yieldValue) : '-';
          const freqText = dist.frequency || '-';
          const marketCap = price.market_cap != null ? `${fmtNumber(price.market_cap)}원` : '-';
          const basisDate = fmtDate(price.date || dist.latest_record_date || cc.date || d.as_of);

          return `
            <tr data-idx="${idx}">
              <td>${etf.name_ko || '-'}</td>
              <td><span class="pill">${etf.ticker || '-'}</span></td>
              <td>${priceText}</td>
              <td>${distText}</td>
              <td>${yieldText}</td>
              <td>${freqText}</td>
              <td>${marketCap}</td>
              <td>${basisDate}</td>
            </tr>
          `;
        }).join('');

        const bindRows = () => {
          const trList = rows.querySelectorAll('tr[data-idx]');
          trList.forEach(tr => {
            tr.addEventListener('click', () => {
              const idx = Number(tr.getAttribute('data-idx'));
              const etf = sorted[idx];
              const url = `./detail.html?ticker=${encodeURIComponent(etf.ticker || '')}`;
              window.location.href = url;
            });
          });
        };

        bindRows();
      })
      .catch(() => {
        const rows = document.getElementById('etf-rows');
        if (rows) {
          rows.innerHTML = '<tr><td colspan="8" class="muted">데이터 로딩 실패</td></tr>';
        }
      });
  </script>
</body>
</html>
